<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="WanderLust - Holiday rentals, cabins, beach houses & more. Explore your next travel destination with ease."
    />

    <!-- Open Graph Meta Tags -->
    <meta
      property="og:title"
      content="WanderLust | Holiday rentals, cabins, beach houses & more"
    />
    <meta
      property="og:description"
      content="Explore your next travel destination with WanderLust. Find holiday rentals, cabins, beach houses, and more."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.yourwebsite.com" />
    <meta property="og:image" content="https://www.yourwebsite.com/logo.png" />

    <title>WanderLust | Holiday rentals, cabins, beach houses & more</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              clifford: "#da373d",
            },
          },
        },
      };
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />

    <!-- Mapbox CSS -->
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css"
      rel="stylesheet"
    />

    <!-- Font Awesome (optional) -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>

    <!-- Mapbox JS -->
    <script
      src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"
      defer
    ></script>

    <!-- React entry point -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
